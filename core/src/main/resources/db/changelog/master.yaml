databaseChangeLog:
  - changeSet:
      id: "1-init-schema"
      author: "brewery"
      changes:
        - createTable:
            tableName: builds
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: repository
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: branch
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: commit
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: webhook_event_id
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: pending
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: TIMESTAMP
              - column:
                  name: completed_at
                  type: TIMESTAMP
              - column:
                  name: duration_seconds
                  type: INT
              - column:
                  name: logs
                  type: TEXT
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        
        - createIndex:
            indexName: idx_builds_repo_branch
            tableName: builds
            columns:
              - column: repository
              - column: branch
        
        - createIndex:
            indexName: idx_builds_status
            tableName: builds
            columns:
              - column: status
        
        - createIndex:
            indexName: idx_builds_created_at
            tableName: builds
            columns:
              - column: created_at
        
        - createTable:
            tableName: artifacts
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: artifact_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: build_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_artifacts_builds
                    references: builds(id)
              - column:
                  name: storage_path
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_size_bytes
                  type: BIGINT
              - column:
                  name: checksum
                  type: VARCHAR(255)
              - column:
                  name: metadata
                  type: JSONB
              - column:
                  name: tags
                  type: TEXT[]
              - column:
                  name: download_count
                  type: INT
                  defaultValue: 0
              - column:
                  name: last_accessed_at
                  type: TIMESTAMP
              - column:
                  name: is_latest
                  type: BOOLEAN
                  defaultValue: false
              - column:
                  name: deprecated_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        
        - addUniqueConstraint:
            tableName: artifacts
            columnNames: name,version
            constraintName: uk_artifacts_name_version
        
        - createIndex:
            indexName: idx_artifacts_name_version
            tableName: artifacts
            columns:
              - column: name
              - column: version
        
        - createIndex:
            indexName: idx_artifacts_build_id
            tableName: artifacts
            columns:
              - column: build_id

  - changeSet:
      id: "2-registry-schema"
      author: "brewery"
      changes:
        - createTable:
            tableName: artifact_metadata
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_metadata_artifacts
                    references: artifacts(id)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: keywords
                  type: TEXT
              - column:
                  name: license
                  type: VARCHAR(255)
              - column:
                  name: homepage_url
                  type: VARCHAR(255)
              - column:
                  name: repository_url
                  type: VARCHAR(255)
              - column:
                  name: maintainers
                  type: TEXT[]
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createTable:
            tableName: artifact_tags
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tags_artifacts
                    references: artifacts(id)
              - column:
                  name: tag
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addUniqueConstraint:
            tableName: artifact_tags
            columnNames: artifact_id,tag
            constraintName: uk_artifact_tags_id_tag

        - createTable:
            tableName: version_aliases
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: artifact_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: alias
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: actual_version
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addUniqueConstraint:
            tableName: version_aliases
            columnNames: artifact_name,alias
            constraintName: uk_version_aliases_name_alias

        - createIndex:
            indexName: idx_artifact_tags_tag
            tableName: artifact_tags
            columns:
              - column: tag

        - createIndex:
            indexName: idx_artifacts_name
            tableName: artifacts
            columns:
              - column: name

  - changeSet:
      id: "3-dependencies-schema"
      author: "brewery"
      changes:
        - createTable:
            tableName: dependencies
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_dependencies_artifacts
                    references: artifacts(id)
                    deleteCascade: true
              - column:
                  name: dependency_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: version_range
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: resolved_version
                  type: VARCHAR(255)
              - column:
                  name: dependency_artifact_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_dependencies_dep_artifacts
                    references: artifacts(id)
              - column:
                  name: dependency_type
                  type: VARCHAR(50)
                  defaultValue: runtime
                  constraints:
                    nullable: false
              - column:
                  name: is_optional
                  type: BOOLEAN
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addUniqueConstraint:
            tableName: dependencies
            columnNames: artifact_id,dependency_name
            constraintName: uk_dependencies_artifact_name

        - createIndex:
            indexName: idx_dependencies_artifact
            tableName: dependencies
            columns:
              - column: artifact_id

        - createIndex:
            indexName: idx_dependencies_name
            tableName: dependencies
            columns:
              - column: dependency_name

        - createIndex:
            indexName: idx_dependencies_resolved
            tableName: dependencies
            columns:
              - column: resolved_version

        - createTable:
            tableName: resolved_dependencies
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_resolved_artifacts
                    references: artifacts(id)
                    deleteCascade: true
              - column:
                  name: dependency_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_resolved_dependencies
                    references: dependencies(id)
                    deleteCascade: true
              - column:
                  name: resolved_to_artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_resolved_to_artifacts
                    references: artifacts(id)
              - column:
                  name: resolved_version
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: resolution_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addUniqueConstraint:
            tableName: resolved_dependencies
            columnNames: artifact_id,dependency_id
            constraintName: uk_resolved_dependencies_artifact_dep

        - createIndex:
            indexName: idx_resolved_dep_artifact
            tableName: resolved_dependencies
            columns:
              - column: artifact_id

        - createTable:
            tableName: reverse_dependencies
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_reverse_artifacts
                    references: artifacts(id)
                    deleteCascade: true
              - column:
                  name: dependent_artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_reverse_dependent_artifacts
                    references: artifacts(id)
                    deleteCascade: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addUniqueConstraint:
            tableName: reverse_dependencies
            columnNames: artifact_id,dependent_artifact_id
            constraintName: uk_reverse_dependencies_artifact_dependent

        - createIndex:
            indexName: idx_reverse_dep_artifact
            tableName: reverse_dependencies
            columns:
              - column: artifact_id

        - createIndex:
            indexName: idx_reverse_dep_dependent
            tableName: reverse_dependencies
            columns:
              - column: dependent_artifact_id

        - createTable:
            tableName: dependency_conflicts
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_conflicts_artifacts
                    references: artifacts(id)
                    deleteCascade: true
              - column:
                  name: conflict_description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: involved_artifacts
                  type: TEXT[]
                  constraints:
                    nullable: false
              - column:
                  name: suggested_resolutions
                  type: TEXT[]
              - column:
                  name: detected_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createIndex:
            indexName: idx_conflicts_artifact
            tableName: dependency_conflicts
            columns:
              - column: artifact_id

  - changeSet:
      id: "4-cascade-schema"
      author: "brewery"
      changes:
        - createTable:
            tableName: rebuild_chains
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: root_artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_chains_root_artifact
                    references: artifacts(id)
              - column:
                  name: root_cause
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: running
                  constraints:
                    nullable: false
              - column:
                  name: depth
                  type: INT
                  defaultValue: 0
              - column:
                  name: parent_chain_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_chains_parent
                    references: rebuild_chains(id)
              - column:
                  name: started_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: completed_at
                  type: TIMESTAMP

        - createIndex:
            indexName: idx_chains_root
            tableName: rebuild_chains
            columns:
              - column: root_artifact_id

        - createIndex:
            indexName: idx_chains_status
            tableName: rebuild_chains
            columns:
              - column: status

        - createIndex:
            indexName: idx_chains_parent
            tableName: rebuild_chains
            columns:
              - column: parent_chain_id

        - createTable:
            tableName: cascade_tasks
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: chain_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cascade_tasks_chain
                    references: rebuild_chains(id)
                    deleteCascade: true
              - column:
                  name: artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cascade_tasks_artifact
                    references: artifacts(id)
              - column:
                  name: dependency_artifact_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cascade_tasks_dep_artifact
                    references: artifacts(id)
              - column:
                  name: reason
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: pending
                  constraints:
                    nullable: false
              - column:
                  name: build_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_cascade_tasks_build
                    references: builds(id)
              - column:
                  name: priority
                  type: INT
                  defaultValue: 0
              - column:
                  name: attempted_at
                  type: TIMESTAMP
              - column:
                  name: completed_at
                  type: TIMESTAMP
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createIndex:
            indexName: idx_cascade_tasks_chain
            tableName: cascade_tasks
            columns:
              - column: chain_id

        - createIndex:
            indexName: idx_cascade_tasks_status
            tableName: cascade_tasks
            columns:
              - column: status

        - createIndex:
            indexName: idx_cascade_tasks_artifact
            tableName: cascade_tasks
            columns:
              - column: artifact_id

  - changeSet:
      id: "5-add-trigger-type-to-rebuild-chains"
      author: "brewery"
      changes:
        - addColumn:
            tableName: rebuild_chains
            columns:
              - column:
                  name: trigger_type
                  type: VARCHAR(100)

  - changeSet:
      id: "6-add-build-id-to-rebuild-chains"
      author: "brewery"
      changes:
        - addColumn:
            tableName: rebuild_chains
            columns:
              - column:
                  name: build_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_rebuild_chains_build
                    references: builds(id)

