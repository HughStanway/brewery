spring:
  application:
    name: brewery-orchestrator
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/supply_chain}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false
  
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/master.yaml
    contexts: ${LIQUIBASE_CONTEXT:prod}
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:brewery-homelab}
      credentials:
        location: ${GCP_CREDENTIALS_LOCATION:}
        encoded-key: ${GCP_CREDENTIALS_ENCODED_KEY:}

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always

logging:
  level:
    root: INFO
    com.homelab.brewery: DEBUG

brewery:
  pubsub:
    subscription-id: ${BREWERY_JOBS_SUBSCRIPTION:brewery-jobs-sub}

  build:
    timeout-seconds: 1800
    max-concurrent-builds: 2
    container-memory: 4g
    container-cpus: 2
  
  artifact-store:
    base-path: ${ARTIFACT_STORE_PATH:/mnt/artifact-store}
    retention-days: ${ARTIFACT_RETENTION_DAYS:90}
  
  docker:
    host: ${DOCKER_HOST:unix:///var/run/docker.sock}
    buildkit-enabled: true
  
  github:
    webhook:
      secret: ${GITHUB_WEBHOOK_SECRET:dev_secret}
      allowed-events:
        - push
        - pull_request
