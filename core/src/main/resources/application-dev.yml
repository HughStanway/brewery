spring:
  application:
    name: brewery-orchestrator-dev
  
  cloud:
    gcp:
      pubsub:
        emulator-host: ${PUBSUB_EMULATOR_HOST:localhost:8085}

  datasource:
    url: jdbc:postgresql://localhost:5432/supply_chain
    username: postgres
    password: dev_password
  
  jpa:
    hibernate:
      ddl-auto: create-drop
  
  liquibase:
    enabled: false

logging:
  level:
    root: INFO
    com.homelab.brewery: DEBUG
    org.springframework.web: DEBUG
