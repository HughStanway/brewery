services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  brewery:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "127.0.0.1:${BREWERY_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - artifact_store:/mnt/artifact-store
      # Mount standard Google Application Default Credentials (ADC) from host
      - ~/.config/gcloud:/root/.config/gcloud:ro
      # Mount GCP service account credentials folder
      - ${GCP_CREDENTIALS_HOST_PATH:-./gcp-keys}:${GCP_CREDENTIALS_CONTAINER_PATH:-/app/gcp-keys}:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=brewery-homelab
    profiles:
      - dev
    ports:
      - "127.0.0.1:${PUBSUB_PORT:-8085}:8085"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - brewery

volumes:
  postgres_data:
  artifact_store:
