services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: supply_chain
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  brewery:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:postgresql://postgres:5432/supply_chain
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-dev_password}
      DOCKER_HOST: unix:///var/run/docker.sock
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-brewery-homelab}
      GCP_CREDENTIALS_LOCATION: ${GCP_CREDENTIALS_LOCATION:-}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - artifact_store:/mnt/artifact-store
      # Mount standard Google Application Default Credentials (ADC) from host
      - ~/.config/gcloud:/root/.config/gcloud:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=brewery-homelab
    ports:
      - "8085:8085"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://brewery:8080
    ports:
      - "3000:3000"
    depends_on:
      - brewery

volumes:
  postgres_data:
  artifact_store:
