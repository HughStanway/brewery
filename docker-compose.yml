services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dind:
    image: docker:25-dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - brewery_builds:/tmp/brewery-builds
      - artifact_store:/mnt/artifact-store
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 5

  brewery:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DOCKER_HOST=tcp://dind:2375
      - DB_URL=jdbc:postgresql://postgres:5432/supply_chain
      - PUBSUB_EMULATOR_HOST=${PUBSUB_EMULATOR_HOST:-pubsub-emulator:8085}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - ARTIFACT_STORE_PATH=/mnt/artifact-store
    ports:
      - "127.0.0.1:${BREWERY_PORT:-8080}:8080"
    volumes:
      - artifact_store:/mnt/artifact-store
      # Mount standard Google Application Default Credentials (ADC) from host
      - ~/.config/gcloud:/root/.config/gcloud:ro
      # Mount GCP service account credentials folder
      - ${GCP_CREDENTIALS_HOST_PATH:-./gcp-keys}:${GCP_CREDENTIALS_CONTAINER_PATH:-/app/gcp-keys}:ro
      # Mount project directory for local repository git cloning (development tests)
      - .:${PWD:-/app/src}:ro
      # Mount temporary builds directory for sibling container builds (DooD/DinD)
      - brewery_builds:/tmp/brewery-builds
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dind:
        condition: service_healthy

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=${GCP_PROJECT_ID:-brewery-homelab}
    profiles:
      - dev
    ports:
      - "127.0.0.1:${PUBSUB_PORT:-8085}:8085"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://brewery:8080
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - brewery

volumes:
  postgres_data:
  artifact_store:
  brewery_builds:
