metadata:
  name: http-server
  versionScheme: semver
build:
  image: ubuntu:22.04
  timeoutSeconds: 600
  memory: 2g
  cpus: 2
steps:
  setup: |
    echo "Installing build and library dependencies..."
    apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y \
      build-essential \
      cmake \
      git \
      libssl-dev \
      openssl \
      software-properties-common
    
    echo "Installing Python 3.13..."
    add-apt-repository -y ppa:deadsnakes/ppa
    apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y \
      python3.13 \
      python3.13-venv \
      python3.13-dev
  build: |
    echo "Configuring and compiling project using CMake..."
    cmake -S . -B build -DENABLE_SANITIZERS=OFF
    cmake --build build
  test: |
    echo "Running Google Test (GTest) unit tests..."
    ./build/tests/unit_tests/unit_tests

    echo "Setting up Python 3.13 virtual environment..."
    python3.13 -m venv .venv
    .venv/bin/pip install --upgrade pip
    .venv/bin/pip install -r requirements-dev.txt

    echo "Running pytest integration tests..."
    .venv/bin/python -m pytest -s tests
artifacts:
  - name: http-server-bin
    pattern: "build/src/http_server"
    type: binary
  - name: httpserver-lib
    pattern: "build/lib/libhttpserver_lib.a"
    type: archive
